<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>말미잘 자포 발사 분자 메커니즘 시뮬레이터</title>
    <script src="https://3dmol.org/build/3Dmol-min.js"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(17, 24, 39, 0.85);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            color: var(--text-main);
            overflow: hidden;
        }

        #container {
            display: flex;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #control-panel {
            width: 360px;
            height: 100%;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px 24px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            overflow-y: auto;
        }

        #viewer-container {
            flex: 1;
            height: 100%;
            position: relative;
        }

        #molecule-viewer {
            width: 100%;
            height: 100%;
        }

        h1 {
            font-size: 20px;
            margin: 0 0 8px 0;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .author {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 12px;
        }

        .step-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }

        .step-card.active {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.05);
        }

        .btn {
            width: 100%;
            padding: 10px 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .btn:hover { background-color: var(--primary-hover); }
        .btn:disabled {
            background-color: #374151;
            color: #6b7280;
            cursor: not-allowed;
        }

        #status-box {
            margin-top: auto;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            padding: 16px;
            font-size: 13px;
            line-height: 1.6;
            border-left: 4px solid var(--primary);
            min-height: 100px;
        }

        #status-title {
            font-weight: 700;
            margin-bottom: 6px;
            color: #60a5fa;
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="control-panel">
            <h1>자포 발사 분자 메커니즘</h1>
            <div class="author">탐구자: 정서희 (고급생명과학 주제탐구)</div>

            <div class="step-card active" id="card-1">
                <button class="btn" id="btn-1" onclick="runStage1()">ㄱ. 화학적 자극 (과분극)</button>
            </div>

            <div class="step-card" id="card-2">
                <button class="btn" id="btn-2" onclick="runStage2()" disabled>ㄴ. 기계적 자극 (nCaV 활성)</button>
            </div>

            <div class="step-card" id="card-3">
                <button class="btn" id="btn-3" onclick="runStage3()" disabled>ㄷ. 삼투압 형성 (팽윤)</button>
            </div>

            <div class="step-card" id="card-4">
                <button class="btn" id="btn-4" onclick="runStage4()" disabled>ㄹ. 캡슐벽 탄성 저장</button>
            </div>

            <div class="step-card" id="card-5">
                <button class="btn" id="btn-5" onclick="runStage5()" disabled>ㅁ. 자포관 전개 (Eversion)</button>
            </div>

            <div id="status-box">
                <div id="status-title">시스템 준 완료</div>
                <div id="status-desc">첫 번째 버튼을 누르면 자포세포막의 화학적 감지 메커니즘 시뮬레이션이 로딩 없이 즉시 시작됩니다.</div>
            </div>
        </div>

        <div id="viewer-container">
            <div id="molecule-viewer"></div>
        </div>
    </div>

    <script>
        let viewer;
        let staticShapes = [];   // 배경 단백질 구조 구조체들
        let animatedShapes = []; // 동적 제어용 이온/물/관체 배열
        let animationInterval;

        // 외부 다운로드 프로세스를 전면 차단하고 클라이언트 렌더링 엔진 즉시 시동
        document.addEventListener("DOMContentLoaded", function() {
            viewer = $3Dmol.createViewer("molecule-viewer", { backgroundColor: "#0b0f19" });
            buildInitialScene();
        });

        // 3D 도형 렌더러 기반으로 nAChR, nCaV, 캡슐 베이스라인 고속 자체 빌드
        function buildInitialScene() {
            // 1. nAChR 수용체를 상징하는 5량체 원통형 채널 배치 (좌측 x: -40)
            for(let i=0; i<5; i++) {
                let angle = (i * 2 * Math.PI) / 5;
                let cx = -40 + Math.cos(angle) * 8;
                let cz = Math.sin(angle) * 8;
                let sub = viewer.addCylinder({ start: {x: cx, y: -20, z: cz}, end: {x: cx, y: 20, z: cz}, radius: 3, color: '#3b82f6', fromCap: true, toCap: true });
                staticShapes.push(sub);
            }

            // 2. nCaV 칼슘 채널을 상징하는 거대 사각형 채널 배치 (우측 x: 40)
            let ncav1 = viewer.addCylinder({ start: {x: 35, y: -20, z: 0}, end: {x: 35, y: 20, z: 0}, radius: 4, color: '#4b5563', fromCap: true, toCap: true });
            let ncav2 = viewer.addCylinder({ start: {x: 45, y: -20, z: 0}, end: {x: 45, y: 20, z: 0}, radius: 4, color: '#4b5563', fromCap: true, toCap: true });
            staticShapes.push(ncav1, ncav2);

            // 3. 하단에 대기 중인 자포 캡슐벽 구조 표현 (y: -120 대형 구체 격자)
            let capsuleOutline = viewer.addSphere({ center: { x: 0, y: -130, z: -50 }, radius: 25, color: '#10b981', opacity: 0.2 });
            staticShapes.push(capsuleOutline);

            viewer.zoomTo({center: {x: -40, y: 0, z: 0}, radius: 30});
            viewer.render();
        }

        function clearCurrentAnimation() {
            clearInterval(animationInterval);
            animatedShapes.forEach(shape => viewer.removeShape(shape));
            animatedShapes = [];
        }

        // ==========================================
        // [ㄱ단계] 화학적 자극에 의한 자포세포 반응성 조절
        // ==========================================
        function runStage1() {
            clearCurrentAnimation();
            updateStatus("ㄱ. 화학적 자극 및 과분극", "ACh가 nAChR에 결합하여 이온 이동을 유도합니다. 이 신호가 Ca²⁺ 의존성 K⁺ 채널을 활성화시켜 세포 내 K⁺ 이온이 외부로 대량 탈출하며 과분극(Hyperpolarization)을 유도합니다. 이 환경 변화는 굳어있던 nCaV를 반응 가능 상태로 프라이밍합니다.");
            
            viewer.animateTo({ center: { x: -40, y: 0, z: 0 }, zoom: 1.5 }, 1000);

            let ach = viewer.addSphere({ center: { x: -40, y: 50, z: 0 }, radius: 2.5, color: '#f59e0b' });
            animatedShapes.push(ach);

            let progress = 0;
            animationInterval = setInterval(() => {
                progress += 0.02;
                if (progress <= 1) {
                    ach.updateStyle({ center: { x: -40, y: 50 - (30 * progress), z: 0 } });
                    viewer.render();
                } else if (progress > 1 && progress <= 1.6) {
                    if(animatedShapes.length === 1) {
                        for(let i=0; i<15; i++) {
                            let kIon = viewer.addSphere({ 
                                center: { x: -50 + (Math.random()*20), y: -15, z: -10 + (Math.random()*20) }, 
                                radius: 1.2, color: '#a7f3d0' 
                            });
                            animatedShapes.push(kIon);
                        }
                    }
                    for(let i = 1; i < animatedShapes.length; i++) {
                        let curCenter = animatedShapes[i].shapeSpec.center;
                        animatedShapes[i].updateStyle({ center: { x: curCenter.x, y: curCenter.y + 2.0, z: curCenter.z } });
                    }
                    viewer.render();
                } else {
                    clearInterval(animationInterval);
                    // nCaV 색상을 활성화 대기 상태인 청록색(#34d399)으로 변경
                    staticShapes[5].updateStyle({ color: '#34d399' });
                    staticShapes[6].updateStyle({ color: '#34d399' });
                    viewer.render();
                    unlockNextStep(2);
                }
            }, 30);
        }

        // ==========================================
        // [ㄴ단계] 기계적 자극에 의한 nCaV 활성화와 Ca²⁺ 전류 형성
        // ==========================================
        function runStage2() {
            clearCurrentAnimation();
            updateStatus("ㄴ. 기계적 자극 및 nCaV 오픈", "접촉에 의한 물리 자극이 세포막을 탈분극 상태로 전환시킵니다. 이에 따라 반응 대기 상태였던 nCaV(청록색 채널)의 구조적 개방이 유도되며, 외부의 Ca²⁺ 이온들이 안쪽 전류(Inward Current)를 형성하며 폭포수처럼 내부로 유입됩니다.");

            viewer.animateTo({ center: { x: 40, y: 0, z: 0 }, zoom: 1.5 }, 1000);
            
            // nCaV 구조 오픈 모방 (두 기둥 간격 확장 연출)
            staticShapes[5].updateStyle({ start: {x: 30, y: -20, z: 0}, end: {x: 30, y: 20, z: 0}, color: '#38bdf8' });
            staticShapes[6].updateStyle({ start: {x: 50, y: -20, z: 0}, end: {x: 50, y: 20, z: 0}, color: '#38bdf8' });

            for(let i=0; i<20; i++) {
                let caIon = viewer.addSphere({
                    center: { x: 35 + (Math.random()*10), y: 40 + (Math.random()*20), z: -5 + (Math.random()*10) },
                    radius: 1.5, color: '#60a5fa'
                });
                animatedShapes.push(caIon);
            }

            let frame = 0;
            animationInterval = setInterval(() => {
                frame++;
                let arrived = 0;
                for(let i=0; i<animatedShapes.length; i++) {
                    let cur = animatedShapes[i].shapeSpec.center;
                    if(cur.y > -40) {
                        let dx = (40 - cur.x) * 0.05;
                        animatedShapes[i].updateStyle({ center: { x: cur.x + dx, y: cur.y - 1.8, z: cur.z } });
                    } else {
                        arrived++;
                    }
                }
                viewer.render();
                if(arrived >= animatedShapes.length || frame > 80) {
                    clearInterval(animationInterval);
                    unlockNextStep(3);
                }
            }, 30);
        }

        // ==========================================
        // [ㄷ단계] 자포 내부 압력과 물 유입에 의한 발사 에너지 형성
        // ==========================================
        function runStage3() {
            clearCurrentAnimation();
            updateStatus("ㄷ. 삼투압 형성 및 기질 팽윤", "세포 내부로 쏟아져 들어온 양이온들이 자포 캡슐 내부의 음전하성 고분자 기질(Poly-γ-glutamate 사슬)에 결합합니다. 내부 용질 농도가 급증함에 따라 농도 구배에 의해 외부 물 분자(H₂O)들이 압도적인 속도로 삼투 유입되며 기질이 팽윤(Swelling)합니다.");

            viewer.animateTo({ center: { x: 0, y: -130, z: -50 }, zoom: 1.0 }, 1000);

            // Poly-gamma-glutamate 결합 노드들 생성
            for(let i=0; i<8; i++) {
                let pNode = viewer.addSphere({ center: { x: -15 + (i*4), y: -130, z: -50 }, radius: 3, color: '#f472b6' });
                animatedShapes.push(pNode);
            }

            // 외부 수분 환경 구체들 생성
            for(let i=0; i<30; i++) {
                let theta = Math.random() * Math.PI * 2;
                let r = 60 + (Math.random()*20);
                let wMolecule = viewer.addSphere({
                    center: { x: Math.cos(theta)*r, y: -130 + (Math.sin(theta)*r), z: -50 },
                    radius: 1.0, color: '#38bdf8'
                });
                animatedShapes.push(wMolecule);
            }

            let frame = 0;
            animationInterval = setInterval(() => {
                frame++;
                for(let i=8; i<animatedShapes.length; i++) {
                    let cur = animatedShapes[i].shapeSpec.center;
                    let dx = (0 - cur.x) * 0.05;
                    let dy = (-130 - cur.y) * 0.05;
                    animatedShapes[i].updateStyle({ center: { x: cur.x + dx, y: cur.y + dy, z: cur.z } });
                }

                if(frame > 15 && frame < 55) {
                    for(let i=0; i<8; i++) {
                        animatedShapes[i].updateStyle({ radius: animatedShapes[i].shapeSpec.radius + 0.08 });
                    }
                    // 외벽 캡슐 크기 팽창 연출
                    staticShapes[7].updateStyle({ radius: staticShapes[7].shapeSpec.radius + 0.2 });
                }
                viewer.render();

                if(frame >= 65) {
                    clearInterval(animationInterval);
                    unlockNextStep(4);
                }
            }, 35);
        }

        // ==========================================
        // [ㄹ단계] 캡슐벽 탄성 에너지 저장
        // ==========================================
        function runStage4() {
            clearCurrentAnimation();
            updateStatus("ㄹ. 복합 층상구조의 탄성 변형", "삼투압으로 부풀어 오른 내부 기질이 150 bar의 압력을 형성합니다. 이 거대한 힘을 받아 Minicollagen 그물망 섬유 격자 및 조밀하게 압축 배치되어 있던 3가닥의 Shaft Filaments가 미세하게 휘어지고 비틀리면서(Bending & Twisting) 역학적 탄성 에너지를 한계치까지 축적합니다.");

            viewer.animateTo({ center: { x: 0, y: -130, z: -50 }, zoom: 0.9 }, 1000);
            
            // 압력 한계를 뜻하는 강렬한 노란색/주황색 격자 반짝임 연출
            staticShapes[7].updateStyle({ color: '#fbbf24', opacity: 0.4 });

            let jitterFrame = 0;
            animationInterval = setInterval(() => {
                jitterFrame++;
                let jitter = Math.sin(jitterFrame * 1.5) * 0.8;
                staticShapes[7].updateStyle({ center: { x: jitter, y: -130, z: -50 } });
                viewer.render();

                if(jitterFrame > 50) {
                    clearInterval(animationInterval);
                    staticShapes[7].updateStyle({ center: { x: 0, y: -130, z: -50 }, color: '#ef4444' }); // 발사 임계점 도달(적색)
                    viewer.render();
                    unlockNextStep(5);
                }
            }, 30);
        }

        // ==========================================
        // [ㅁ단계] shaft discharge, shaft eversion, tubule eversion
        // ==========================================
        function runStage5() {
            clearCurrentAnimation();
            updateStatus("ㅁ. 자포관 전개 3단계 피날레", "축적된 탄성 압축 에너지가 폭발하며 물리 전개가 시작됩니다. [1] Shaft 덩어리가 고속 방출(Discharge
