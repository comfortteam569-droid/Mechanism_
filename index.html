<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>말미잘 자포 발사 분자 메커니즘 시뮬레이터</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/3dmol/2.0.4/3Dmol-min.js"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(17, 24, 39, 0.85);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
            overflow: hidden;
        }

        #container {
            display: flex;
            width: 100vw; height: 100vh;
        }

        /* 왼쪽 기능 제어반 패널 */
        #control-panel {
            width: 380px; height: 100%;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 35px 26px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        /* 오른쪽 3D 시뮬레이션 고해상도 캔버스 영역 */
        #viewer-container {
            flex: 1; height: 100%;
            position: relative;
            background: radial-gradient(circle at center, #111827 0%, #070a10 100%);
        }

        #molecule-viewer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        h1 {
            font-size: 22px; margin: 0 0 30px 0; font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #60a5fa, #34d399);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .step-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px; padding: 12px; margin-bottom: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .step-card.active {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.08);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.15);
        }

        .btn {
            width: 100%; padding: 14px;
            background-color: var(--primary); color: white;
            border: none; border-radius: 8px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:hover:not(:disabled) { 
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }
        
        .btn:active:not(:disabled) {
            transform: translateY(1px);
        }

        .btn:disabled {
            background-color: #1f2937; color: #4b5563; cursor: not-allowed;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        /* 하단 메커니즘 유기적 실시간 해설창 */
        #status-box {
            margin-top: auto; background: rgba(0, 0, 0, 0.5);
            border-radius: 10px; padding: 18px; font-size: 13.5px; line-height: 1.6;
            border-left: 4px solid var(--primary); min-height: 130px;
            box-sizing: border-box;
        }

        #status-title { font-weight: 700; margin-bottom: 8px; color: #60a5fa; font-size: 14.5px; }
        #status-desc { color: #e5e7eb; }
    </style>
</head>
<body>

    <div id="container">
        <div id="control-panel">
            <h1>자포 발사 분자 메커니즘</h1>

            <div class="step-card active" id="card-1">
                <button class="btn" id="btn-1" onclick="runStage1()">ㄱ. 화학적 자극 (과분극)</button>
            </div>

            <div class="step-card" id="card-2">
                <button class="btn" id="btn-2" onclick="runStage2()" disabled>ㄴ. 기계적 자극 (nCaV 활성)</button>
            </div>

            <div class="step-card" id="card-3">
                <button class="btn" id="btn-3" onclick="runStage3()" disabled>ㄷ. 삼투압 형성 (팽윤)</button>
            </div>

            <div class="step-card" id="card-4">
                <button class="btn" id="btn-4" onclick="runStage4()" disabled>ㄹ. 캡슐벽 탄성 저장</button>
            </div>

            <div class="step-card" id="card-5">
                <button class="btn" id="btn-5" onclick="runStage5()" disabled>ㅁ. 자포관 전개 (Eversion)</button>
            </div>

            <div id="status-box">
                <div id="status-title">시스템 대기 중</div>
                <div id="status-desc">첫 번째 버튼을 누르면 자포세포막의 화학적 감지 메커니즘 시뮬레이션이 노트북 해상도에 맞춰 부드럽게 시작됩니다.</div>
            </div>
        </div>

        <div id="viewer-container">
            <div id="molecule-viewer"></div>
        </div>
    </div>

    <script>
        let viewer = null;
        let staticShapes = [];   
        let animatedShapes = []; 
        let animationInterval = null;

        // PC 브라우저 윈도우 로딩 완료 후 3D 그래픽 컨텍스트 바인딩
        window.onload = function() {
            try {
                let element = document.getElementById("molecule-viewer");
                viewer = $3Dmol.createViewer(element, { backgroundColor: "#0b0f19" });
                buildInitialScene();
            } catch(e) {
                console.error("3D 뷰어 초기화 실패:", e);
            }
        };

        // 분자 구조 및 소기관 3D 지오메트리 고해상도 생성 및 좌표 맵 구축
        function buildInitialScene() {
            if (!viewer) return;

            // 1. nAChR 수용체 빌드 (좌측 배치, x: -40)
            for(let i=0; i<5; i++) {
                let angle = (i * 2 * Math.PI) / 5;
                let cx = -40 + Math.cos(angle) * 8;
                let cz = Math.sin(angle) * 8;
                let sub = viewer.addCylinder({ start: {x: cx, y: -25, z: cz}, end: {x: cx, y: 25, z: cz}, radius: 3, color: '#3b82f6', fromCap: true, toCap: true });
                staticShapes.push(sub);
            }

            // 2. nCaV 칼슘 채널 빌드 (우측 배치, 초기 불활성 상태 회색 표현, x: 40)
            let ncav1 = viewer.addCylinder({ start: {x: 36, y: -25, z: 0}, end: {x: 36, y: 25, z: 0}, radius: 4, color: '#4b5563', fromCap: true, toCap: true });
            let ncav2 = viewer.addCylinder({ start: {x: 44, y: -25, z: 0}, end: {x: 44, y: 25, z: 0}, radius: 4, color: '#4b5563', fromCap: true, toCap: true });
            staticShapes.push(ncav1, ncav2);

            // 3. 하단 내부 자포 캡슐 구형 구조 배치 (y: -130)
            let capsuleOutline = viewer.addSphere({ center: { x: 0, y: -135, z: -40 }, radius: 25, color: '#10b981', opacity: 0.15 });
            staticShapes.push(capsuleOutline);

            // 초기 카메라 시선을 nAChR 수용체 중심에 타겟 줌인
            viewer.zoomTo({center: {x: -40, y: 0, z: 0}, radius: 28});
            viewer.render();
        }

        function clearCurrentAnimation() {
            if(animationInterval) clearInterval(animationInterval);
            if(viewer) {
                animatedShapes.forEach(shape => viewer.removeShape(shape));
            }
            animatedShapes = [];
        }

        // ==========================================
        // [ㄱ단계] 화학적 자극에 의한 자포세포 반응성 조절
        // ==========================================
        function runStage1() {
            if (!viewer) return;
            clearCurrentAnimation();
            updateStatus("ㄱ. 화학적 자극 및 과분극", "ACh 분자가 nAChR에 결합하여 이온 이동 통로를 개방합니다. 이 신호가 Ca²⁺ 의존성 K⁺ 채널을 작동시켜 세포 내부에 차 있던 K⁺ 이온들을 세포 밖으로 대량 탈출시키며 과분극(Hyperpolarization)을 유도합니다. 이 환경 변화는 비활성 상태였던 nCaV를 반응 가능 상태로 프라이밍(준비)합니다.");
            
            // 카메라 스무스 이동
            viewer.animateTo({ center: { x: -40, y: 0, z: 0 }, zoom: 1.5 }, 1000);

            // ACh 분자 생성 및 하강 유도
            let ach = viewer.addSphere({ center: { x: -40, y: 55, z: 0 }, radius: 2.5, color: '#f59e0b' });
            animatedShapes.push(ach);

            let progress = 0;
            animationInterval = setInterval(() => {
                progress += 0.02;
                if (progress <= 1) {
                    ach.updateStyle({ center: { x: -40, y: 55 - (35 * progress), z: 0 } });
                    viewer.render();
                } else if (progress > 1 && progress <= 1.6) {
                    // K+ 이온들 생성 및 상방 분출선 구현
                    if(animatedShapes.length === 1) {
                        for(let i=0; i<18; i++) {
                            let kIon = viewer.addSphere({ 
                                center: { x: -52 + (Math.random()*24), y: -18, z: -10 + (Math.random()*20) }, 
                                radius: 1.2, color: '#a7f3d0' 
                            });
                            animatedShapes.push(kIon);
                        }
                    }
                    for(let i = 1; i < animatedShapes.length; i++) {
                        let curCenter = animatedShapes[i].shapeSpec.center;
                        animatedShapes[i].updateStyle({ center: { x: curCenter.x, y: curCenter.y + 2.2, z: curCenter.z } });
                    }
                    viewer.render();
                } else {
                    clearInterval(animationInterval);
                    // 과분극 완료에 따라 nCaV 채널의 반응 활성 상태를 알리는 색상 변화 연출 (청록색)
                    staticShapes[5].updateStyle({ color: '#34d399' });
                    staticShapes[6].updateStyle({ color: '#34d399' });
                    viewer.render();
                    unlockNextStep(2);
                }
            }, 30);
        }

        // ==========================================
        // [ㄴ단계] 기계적 자극에 의한 nCaV 활성화와 Ca²⁺ 전류 형성
        // ==========================================
        function runStage2() {
            if (!viewer) return;
            clearCurrentAnimation();
            updateStatus("ㄴ. 기계적 자극 및 nCaV 오픈", "접촉에 의한 물리적인 기계적 자극이 유입되면서 세포막 전체가 탈분극 상태로 대전됩니다. 이에 반응하여 활성 대기 중이던 nCaV 채널의 기둥 구조가 사방으로 확장되며 완전히 개방(오픈)되고, 외부 세포외액에 대기하던 대량의 Ca²⁺ 이온들이 안쪽 전류를 형성하며 세포 내부로 빠르게 유입됩니다.");

            // 카메라 이동: nAChR에서 nCaV 채널로 부드러운 패닝 시점 무빙
            viewer.animateTo({ center: { x: 40, y: 0, z: 0 }, zoom: 1.5 }, 1000);
            
            // nCaV 채널 게이트 오픈 구조적 변형 연출
            staticShapes[5].updateStyle({ start: {x: 28, y: -25, z: 0}, end: {x: 28, y: 25, z: 0}, color: '#38bdf8' });
            staticShapes[6].updateStyle({ start: {x: 52, y: -25, z: 0}, end: {x: 52, y: 25, z: 0}, color: '#38bdf8' });

            // 세포 외부 영역에 대량의 Ca2+ 이온 구조체 무더기 배치
            for(let i=0; i<25; i++) {
                let caIon = viewer.addSphere({
                    center: { x: 34 + (Math.random()*12), y: 45 + (Math.random()*25), z: -5 + (Math.random()*10) },
                    radius: 1.5, color: '#60a5fa'
                });
                animatedShapes.push(caIon);
            }

            let frame = 0;
            animationInterval = setInterval(() => {
                frame++;
                let arrived = 0;
                for(let i=0; i<animatedShapes.length; i++) {
                    let cur = animatedShapes[i].shapeSpec.center;
                    if(cur.y > -45) {
                        // 채널 내부 정중앙 축으로 수렴하며 쏟아져 내리는 역학 동선
                        let dx = (40 - cur.x) * 0.05;
                        animatedShapes[i].updateStyle({ center: { x: cur.x + dx, y: cur.y - 2.0, z: cur.z } });
                    } else {
                        arrived++;
                    }
                }
                viewer.render();
                if(arrived >= animatedShapes.length || frame > 85) {
                    clearInterval(animationInterval);
                    unlockNextStep(3);
                }
            }, 30);
        }

        // ==========================================
        // [ㄷ단계] 자포 내부 압력과 물 유입에 의한 발사 에너지 형성
        // ==========================================
        function runStage3() {
            if (!viewer) return;
            clearCurrentAnimation();
            updateStatus("ㄷ. 삼투압 형성 및 기질 팽윤", "세포막을 통과해 하단으로 쏟아져 유입된 양이온들이 자포 캡슐 중심에 뭉쳐 있는 음전하성 고분자 기질(Poly-γ-glutamate 사슬) 측쇄에 정전기적으로 결합합니다. 내부 용질 농도가 급격하게 증가함에 따라, 농도 구배에 부합하여 외부의 무수한 물 분자(H₂O)들이 자포 내부로 맹렬히 삼투 압입되며 기질 전체가 크게 부풀어 오르는 팽윤(Swelling) 현상이 일어납니다.");

            // 카메라 이동: 세포막 채널 영역에서 하부 자포 캡슐 내부 구조로 완전 줌인
            viewer.animateTo({ center: { x: 0, y: -135, z: -40 }, zoom: 1.1 }, 1000);

            // Poly-gamma-glutamate 사슬 노드 구형 사슬 배치
            for(let i=0; i<10; i++) {
                let pNode = viewer.addSphere({ center: { x: -18 + (i*4), y: -135 + (Math.sin(i)*4), z: -40 }, radius: 3, color: '#f472b6' });
                animatedShapes.push(pNode);
            }

            // 외부 환경으로부터 캡슐 안쪽으로 밀려 들어갈 다량의 물 분자 배치
            for(let i=0; i<35; i++) {
                let theta = Math.random() * Math.PI * 2;
                let r = 65 + (Math.random()*25);
                let wMolecule = viewer.addSphere({
                    center: { x: Math.cos(theta)*r, y: -135 + (Math.sin(theta)*r), z: -40 },
                    radius: 1.1, color: '#38bdf8'
                });
                animatedShapes.push(wMolecule);
            }

            let frame = 0;
            animationInterval = setInterval(() => {
                frame++;
                // 물 분자들의 중심부 수렴 흐름 제어
                for(let i=10; i<animatedShapes.length; i++) {
                    let cur = animatedShapes[i].shapeSpec.center;
                    let dx = (0 - cur.x) * 0.05;
                    let dy = (-135 - cur.y) * 0.05;
                    animatedShapes[i].updateStyle({ center: { x: cur.x + dx, y: cur.y + dy, z: cur.z } });
                }

                // 물이 차오름에 따라 음전하 고분자 사슬 기질 입자가 거대하게 비대해지는 연출 (팽윤)
                if(frame > 15 && frame < 60) {
                    for(let i=0; i<10; i++) {
                        animatedShapes[i].updateStyle({ radius: animatedShapes[i].shapeSpec.radius + 0.07 });
                    }
                    // 외부 캡슐 투명 주머니 외경도 확장
                    staticShapes[7].updateStyle({ radius: staticShapes[7].shapeSpec.radius + 0.18 });
                }
                viewer.render();

                if(frame >= 70) {
                    clearInterval(animationInterval);
                    unlockNextStep(4);
                }
            }, 35);
        }

        // ==========================================
        // [ㄹ단계] 캡슐벽 탄성 에너지 저장
        // ==========================================
        function runStage4() {
            if (!viewer) return;
            clearCurrentAnimation();
            updateStatus("ㄹ. 복합 층상구조의 탄성 변형", "삼투압 팽윤의 결과로 자포 내부 압력은 무려 150 bar(수심 1,500m 압력)에 도달합니다. 이 무지막지한 팽창력을 견뎌내며, 단단하게 얽혀 있던 Minicollagen 그물망 섬유들과 내부의 Shaft 단백질 섬유 가닥들이 탄성 한계치까지 팽팽하게 휘어지고 비틀리면서(Bending & Twisting) 역학적인 탄성 에너지를 내부에 가득 저장합니다.");

            // 카메라 워킹: 전체적인 캡슐벽의 탄성 응축을 보기 위해 광각 매크로 뷰 줌아웃
            viewer.animateTo({ center: { x: 0, y: -135, z: -40 }, zoom: 0.95 }, 1000);
            
            // 임계 압력에 의한 에너지 집약 시각화 (노란색 ➔ 붉은색 그라데이션)
            staticShapes[7].updateStyle({ color: '#fbbf24', opacity: 0.4 });

            let jitterFrame = 0;
            // 150 bar 내부 저항에 의한 단백질 그물망의 미세 떨림 루프 연출
            animationInterval = setInterval(() => {
                jitterFrame++;
                let jitter = Math.sin(jitterFrame * 1.6) * 0.9;
                staticShapes[7].updateStyle({ center: { x: jitter, y: -135, z: -40 } });
                viewer.render();

                if(jitterFrame > 55) {
                    clearInterval(animationInterval);
                    // 에너지가 폭발하기 직전의 임계 상태 레드 시그널 컬러 매핑 후 대기
                    staticShapes[7].updateStyle({ center: { x: 0, y: -135, z: -40 }, color: '#ef4444' }); 
                    viewer.render();
                    unlockNextStep(5);
                }
            }, 30);
        }

        // ==========================================
        // [ㅁ단계] shaft discharge, shaft eversion, tubule eversion
        // ==========================================
        function runStage5() {
            if (!viewer) return;
            clearCurrentAnimation();
            updateStatus("ㅁ. 자포관 전개 3단계 피날레", "축적되었던 150 bar의 탄성 에너지가 문이 열림과 동시에 폭발하며 물리적인 사출 메커니즘이 완성됩니다. [1] Shaft 덩어리가 상방 표적 방향으로 고속 방출(Discharge)되며 두 겹의 관 벽을 형성하고, [2] 커넥터 단백질 반동력으로 인해 소매가 뒤집히듯 안팎이 180도 부드럽게 뒤집히며(Eversion) 내부에 빈 보호 통로(Lumen)를 확보합니다. [3] 최종적으로 캡슐 속에 말려 있던 유연한 Tubule 가닥이 앞선 Lumen 통로 내부를 관통해 마하의 속도로 전방 확장 도출되며, 내벽에 숨겨져 있던 작살형 가시(Barbs) 단백질 분자들을 바깥쪽 표면에 나선형 격자로 정렬 전개시킵니다.");

            // 사출 궤적을 롱샷으로 포착하기 위해 전체 화면 리셋 및 카메라 롱뷰 셋팅
            viewer.removeAllShapes();
            viewer.animateTo({ center: { x: 0, y: 130, z: 0 }, zoom: 0.52 }, 1200);

            // 초기 압축형 Shaft 관형 실린더 생성
            let shaft = viewer.addCylinder({ start: {x:0, y:-60, z:0}, end: {x:0, y:0, z:0}, radius: 8, color: '#34d399', fromCap: true, toCap: true });
            animatedShapes.push(shaft);

            let subStage = 0;
            let progress = 0;
            
            animationInterval = setInterval(() => {
                progress += 0.04;
                
                if (subStage === 0) {
                    // [서브 1] Shaft Discharge
                    let currentY = -60 + (130 * progress);
                    shaft.updateStyle({ start: {x:0, y:currentY, z:0}, end: {x:0, y:currentY + 55, z:0} });
                    if(progress >= 1) { subStage = 1; progress = 0; }
                } 
                else if (subStage === 1) {
                    // [서브 2] Shaft Eversion (폭 확장 및 속이 빈 반투명 Lumen 통로 가시화)
                    shaft.updateStyle({ radius: 16, color: '#60a5fa', opacity: 0.35 });
                    if(progress >= 0.4) { 
                        subStage = 2; progress = 0; 
                        // [서브 3 관통 터뷸 준비]
                        let tubule = viewer.addCylinder({ start: {x:0, y:75, z:0}, end: {x:0, y:80, z:0}, radius: 3, color: '#f472b6' });
                        animatedShapes.push(tubule);
                    }
                } 
                else if (subStage === 2) {
                    // [서브 3] Tubule Eversion & Barbs 나선 전개
                    let tubule = animatedShapes[1];
                    let tExt = 80 + (240 * progress);
                    tubule.updateStyle({ end: {x:0, y:tExt, z:0} });

                    // 터뷸이 솟구쳐 뒤집어지며 가시(Barbs)들이 관 외벽으로 튀어나오는 수학적 나선 동선 연출
                    if (Math.random() > 0.38 && tExt < 310) {
                        let angle = progress * 18;
                        let bx = Math.cos(angle) * 10;
                        let bz = Math.sin(angle) * 10;
                        let barb = viewer.addCylinder({
                            start: { x: 0, y: tExt - 6, z: 0 }, end: { x: bx, y: tExt, z: bz },
                            radius: 1.5, color: '#ef4444', toCap: true
                        });
                        animatedShapes.push(barb);
                    }

                    if(progress >= 1) {
                        clearInterval(animationInterval);
                        updateStatus("✨ 메커니즘 구동 완료", "말미잘 자포세포의 5단계 정밀 분자 발사 사이클 전개가 완벽하게 검증되었습니다. 역학적 반전 구조와 바브의 정렬이 모두 끝났습니다.");
                    }
                }
                viewer.render();
            }, 40);
        }

        function updateStatus(title, desc) {
            document.getElementById("status-title").innerText = title;
            document.getElementById("status-desc").innerText = desc;
        }

        function unlockNextStep(stepIdx) {
            for(let i=1; i<=5; i++) {
                document.getElementById(`card-${i}`).classList.remove("active");
            }
            document.getElementById(`card-${stepIdx}`).classList.add("active");
            document.getElementById(`btn-${stepIdx}`).disabled = false;
        }
    </script>
</body>
</html>
