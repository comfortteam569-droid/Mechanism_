<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>자포 사출 메커니즘 애니메이션</title>
    <style>
        body { background: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Pretendard', sans-serif; }
        
        #canvas { width: 700px; height: 450px; position: relative; border: 1px solid #ddd; background: #f9f9f9; }
        
        /* 실제 분자 2D 그림 스타일 */
        .mol-asset { 
            width: 100%; height: 100%; position: absolute; top: 0; left: 0; 
            opacity: 0; transition: opacity 0.8s ease, transform 0.5s ease;
            object-fit: contain; pointer-events: none;
        }
        
        .active { opacity: 1; }
        
        /* 메커니즘 작동 시각화 효과 */
        .effect-swelling { transform: scale(1.15); } /* 3단계 팽윤 */
        .effect-vibration { animation: vibrate 0.1s linear infinite; } /* 4단계 응축 진동 */
        @keyframes vibrate { 0% { transform: translate(2px, 0); } 100% { transform: translate(-2px, 0); } }
        
        #controller { margin-top: 30px; }
        button { padding: 12px 25px; cursor: pointer; background: #222; color: #fff; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="canvas">
        <img src="step1_nAChR.png" class="mol-img mol-asset" id="step1">
        <img src="step2_nCaV.png" class="mol-img mol-asset" id="step2">
        <img src="step3_PolyGlu.png" class="mol-img mol-asset" id="step3">
        <img src="step4_Minicollagen.png" class="mol-img mol-asset" id="step4">
        <img src="step5_Tubule.png" class="mol-img mol-asset" id="step5">
    </div>

    <div id="controller">
        <button onclick="runMechanism()">보고서 메커니즘 애니메이션 시작</button>
    </div>

    <script>
        async function runMechanism() {
            const steps = [
                { id: 'step1', effect: '' },
                { id: 'step2', effect: '' },
                { id: 'step3', effect: 'effect-swelling' }, // 3단계: 팽윤
                { id: 'step4', effect: 'effect-vibration' }, // 4단계: 응축 진동
                { id: 'step5', effect: '' }
            ];

            for (let s of steps) {
                // 이전 이미지 초기화
                document.querySelectorAll('.mol-asset').forEach(img => img.classList.remove('active', 'effect-swelling', 'effect-vibration'));
                
                // 현재 단계 활성화 및 효과 적용
                const current = document.getElementById(s.id);
                current.classList.add('active');
                if(s.effect) current.classList.add(s.effect);
                
                // 각 단계별 메커니즘 설명 시간 (2.5초)
                await new Promise(r => setTimeout(r, 2500));
            }
        }
    </script>
</body>
</html>
