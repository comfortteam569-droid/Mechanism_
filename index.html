<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>말미잘 자포 사출 분자 역학 고증 시뮬레이터</title>
    <style>
        :root {
            --bg-slate: #0f172a;
            --accent-cyan: #06b6d4;
            --panel-blue: rgba(15, 23, 42, 0.95);
        }
        body {
            background-color: var(--bg-slate);
            color: #f8fafc;
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 { font-size: 18px; margin: 0 0 4px 0; color: #38bdf8; }
        .sub { font-size: 11px; color: #64748b; margin-bottom: 12px; }
        
        /* 모식도 스크린 (논문 스타일의 깔끔한 화이트 시트 배경) */
        #viewport {
            position: relative;
            width: 800px;
            height: 450px;
            border: 2px solid #334155;
            border-radius: 12px;
            background: #ffffff;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        canvas { display: block; width: 100%; height: 100%; }

        /* 엑셀 연동 컨트롤러 패널 */
        #dock-menu { margin-top: 15px; display: flex; gap: 5px; }
        .dock-btn {
            background: #1e293b; border: 1px solid #475569; color: #94a3b8;
            padding: 9px 12px; font-size: 11px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: all 0.2s;
        }
        .dock-btn.active {
            background: #0284c7; color: #ffffff; border-color: #38bdf8;
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.4);
        }

        /* 엑셀 매핑 대시보드 */
        #excel-dashboard {
            width: 800px; margin-top: 12px; padding: 12px;
            background: var(--panel-blue); border-radius: 8px; border-left: 4px solid var(--accent-cyan); box-sizing: border-box;
        }
        .dash-row { display: flex; font-size: 11px; margin-bottom: 3px; line-height: 1.4; }
        .dash-label { width: 110px; color: var(--accent-cyan); font-weight: bold; flex-shrink: 0; }
        .dash-val { color: #e2e8f0; }
    </style>
</head>
<body>

    <h1>말미잘(Nematostella) 자포 사출 분자 구조역학 고증 애니메이션</h1>
    <div class="sub">제출된 구조 자산 목록 엑셀 데이터 매핑 리얼타임 그래픽 엔진</div>

    <div id="viewport">
        <canvas id="biophysicsRender" width="800" height="450"></canvas>
    </div>

    <div id="dock-menu">
        <button class="dock-btn" id="b1" onclick="loadExcelStep(1)">단계 ㄱ. nAChR 및 신호 자극</button>
        <button class="dock-btn" id="b2" onclick="loadExcelStep(2)">단계 ㄴ. nCaV 채널 개방</button>
        <button class="dock-btn" id="b3" onclick="loadExcelStep(3)">단계 ㄷ. Poly-&gamma;-Glu 삼투팽윤</button>
        <button class="dock-btn" id="b4" onclick="loadExcelStep(4)">단계 ㄹ. 미니콜라겐 탄성응축</button>
        <button class="dock-btn" id="b5" onclick="loadExcelStep(5)">단계 ㅁ. 자포관(Tubule) 사출</button>
    </div>

    <div id="excel-dashboard">
        <div class="dash-row"><div class="dash-label">분자 및 구조체:</div><div class="dash-val" id="d-name">-</div></div>
        <div class="dash-row"><div class="dash-label">추천 PDB ID:</div><div class="dash-val" id="d-pdb" style="font-family:monospace; color:#f43f5e; font-weight:bold;">-</div></div>
        <div class="dash-row"><div class="dash-label">물리적 변화 역학:</div><div class="dash-val" id="d-physics">-</div></div>
    </div>

    <script>
        const canvas = document.getElementById('biophysicsRender');
        const ctx = canvas.getContext('2d');

        let step = 1;
        let timeline = 0;
        let molecules = [];

        // 🌟 서희 학생의 엑셀 데이터 그대로 매핑
        const excelRegistry = {
            1: { name: "Acetylcholine (ACh), nAChR 수용체 (7KCO), Calcium (CA), Sodium (NA)", pdb: "ACH, CA, NA, 7KCO", physics: "세포 밖에서 nAChR 결합 부위로 ACh 직선 이동 후 결합. nAChR 중심 기공(Pore)이 미세하게 확장되며 이온 유입 시작" },
            2: { name: "nCaV 전압 개폐성 채널 활성화 상태 (6JPA / 7VFU), Calcium (Ca2+)", pdb: "6JPA, 7VFU, CA", physics: "탈분극 발생에 의해 nCaV 전압감지도메인이 작동하며 중심 포어(Pore)가 완전히 대칭으로 개방됨. Ca2+ 이온들이 폭포수처럼 대량 하강 유입" },
            3: { name: "Poly-&gamma;-glutamate 기질 (1A9M/3N2K), 물 분자 (H2O), 자포 캡슐벽 (1CAG)", pdb: "1A9M, 3N2K, HOH, 1CAG", physics: "음전하 곁사슬에 양이온들이 자석처럼 흡착 결합. 결합 밀도가 치솟으며 외부 H2O 분자들이 벽을 뚫고 급격히 압입, 전체 구형 격자 볼륨 팽윤(Swelling)" },
            4: { name: "Minicollagen 그물망 (1CAG/1BKV), Nematogalectin (6RRE), Glycan", pdb: "1CAG, 1BKV, 6RRE, NAG", physics: "내부 압력이 150 bar 수준에 도달함에 따라 미니콜라겐 삼중나선 가교 그물망 구조가 터지지 않고 팽팽하게 휘어지며 탄성 Strain 에너지 응축" },
            5: { name: "Shaft Filaments (1CAG), Tubule Wall (3HQV), Barbs 가시 복합체 (4UXE)", pdb: "1CAG, 3HQV, 4UXE, 2AZG", physics: "조밀한 나선형 압축 상태가 해제되며 상부 캡을 뚫고 180도 뒤집혀 반전 사출(Eversion). 사출관 벽이 전개되는 순간 날카로운 작살 가시들이 바깥쪽으로 나선형 스핀 전개" }
        };

        function loadExcelStep(s) {
            step = s;
            timeline = 0;
            document.querySelectorAll('.dock-btn').forEach((btn, i) => btn.classList.toggle('active', i + 1 === s));
            document.getElementById('d-name').innerText = excelRegistry[s].name;
            document.getElementById('d-pdb').innerText = excelRegistry[s].pdb;
            document.getElementById('d-physics').innerText = excelRegistry[s].physics;

            molecules = [];
            if (s === 1) {
                for(let i=0; i<6; i++) molecules.push({ x: 320 + i*30, y: -20, ty: 175 + Math.sin(i)*12, v: 1.8 + Math.random() });
            } else if (s === 2) {
                for(let i=0; i<30; i++) molecules.push({ x: 400 + (Math.random()-0.5)*18, y: 40 + Math.random()*30, v: 3 + Math.random()*2 });
            } else if (s === 3) {
                for(let i=0; i<40; i++) {
                    let rad = Math.random() * Math.PI * 2;
                    molecules.push({ x: 400 + Math.cos(rad)*270, y: 240 + Math.sin(rad)*170, rad: rad, v: 2 + Math.random() });
                }
            }
        }

        // 🌟 엑셀 구조 고증 드로잉 엔진 (실제 단백질 특징 반영)
        function drawPDBStructure(step, time) {
            ctx.save();
            const cx = 400, cy = 240;

            if (step === 1) {
                // 1. nAChR (7KCO) 리얼 2D 오량체(Pentamer) 도면 구조 구현
                ctx.strokeStyle = '#0284c7'; ctx.lineWidth = 4;
                
                // PDB 7KCO 고유의 5방향 대칭 서브유닛 및 중심 통로(Pore) 드로잉
                for(let i=0; i<5; i++) {
                    let ang = (i * 2 * Math.PI) / 5 + (time * 0.05); // 미세하게 숨쉬듯 움직이는 연산
                    let sx = cx + Math.cos(ang) * 52;
                    let sy = cy + Math.sin(ang) * 52;
                    
                    // 서브유닛 몸체 (리얼 단백질 굴곡 형태)
                    ctx.fillStyle = 'rgba(224, 242, 254, 0.9)';
                    ctx.beginPath(); ctx.arc(sx, sy, 35, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                    
                    // 알파/베타 사슬 결합 포켓 (ACH 도킹 자리 고증)
                    ctx.fillStyle = '#bae6fd';
                    ctx.beginPath(); ctx.arc(sx + Math.cos(ang)*20, sy + Math.sin(ang)*20, 12, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                }
                
                // 중심 이온 기공(Pore) - ACh 결합 시 미세 확장 연산
                let poreSize = 14 + Math.min(6, time * 3);
                ctx.fillStyle = '#ffffff'; ctx.strokeStyle = '#0284c7';
                ctx.beginPath(); ctx.arc(cx, cy, poreSize, 0, Math.PI*2); ctx.fill(); ctx.stroke();

                // ACh (ACH) 리간드 입자 유기적 직선 이동 및 결합 애니메이션
                molecules.forEach(p => {
                    if (p.y < p.ty) p.y += p.v;
                    ctx.fillStyle = '#a855f7'; ctx.strokeStyle = '#6b21a8'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 8, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                    // 분자 세부 작용기 형태 묘사 (소형 도메인 결합체 고증)
                    ctx.beginPath(); ctx.arc(p.x+5, p.y-4, 4, 0, Math.PI*2); ctx.fill();
                });
            }
            else if (step === 2) {
                // 2. nCaV 채널 (6JPA / 7VFU) 막단백질 채널 개방 모식도
                let gateOpen = Math.min(30, time * 12); // 전압 감지에 따른 기공 수평 확장 기하학
                ctx.strokeStyle = '#2563eb'; ctx.lineWidth = 5; ctx.fillStyle = '#eff6ff';

                // 좌/우 대칭형 S1-S6 막관통 알파 나선 대형 도메인 구조 정밀 드로잉
                // 좌측 도메인 바디
                ctx.beginPath();
                ctx.shadowColor = 'rgba(0,0,0,0.1)'; ctx.shadowBlur = 10;
                ctx.moveTo(cx - 80 - gateOpen, cy - 120);
                ctx.bezierCurveTo(cx - 160 - gateOpen, cy - 50, cx - 150 - gateOpen, cy + 50, cx - 80 - gateOpen, cy + 120);
                ctx.lineTo(cx - 25 - gateOpen, cy + 80);
                ctx.bezierCurveTo(cx - 60 - gateOpen, cy + 40, cx - 60 - gateOpen, cy - 40, cx - 25 - gateOpen, cy - 80);
                ctx.closePath(); ctx.fill(); ctx.stroke();

                // 우측 도메인 바디
                ctx.beginPath();
                ctx.moveTo(cx + 80 + gateOpen, cy - 120);
                ctx.bezierCurveTo(cx + 160 + gateOpen, cy - 50, cx + 150 + gateOpen, cy + 50, cx + 80 + gateOpen, cy + 120);
                ctx.lineTo(cx + 25 + gateOpen, cy + 80);
                ctx.bezierCurveTo(cx + 60 + gateOpen, cy + 40, cx + 60 + gateOpen, cy - 40, cx + 25 + gateOpen, cy - 80);
                ctx.closePath(); ctx.fill(); ctx.stroke();
                ctx.shadowBlur = 0;

                // 개방된 포어 터널 사이로 유입되는 Ca2+ (CA) 폭포수 하강 애니메이션
                molecules.forEach(p => {
                    p.y += p.v;
                    if (p.y > cy + 140) { p.y = cy - 130; p.x = cx + (Math.random()-0.5)*18; }
                    ctx.fillStyle = '#06b6d4'; ctx.strokeStyle = '#0891b2'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(p.x + Math.sin(p.y*0.06)*12, p.y, 6, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                });
            }
            else if (step === 3) {
                // 3. Poly-γ-glutamate 고분자 기질 (1A9M) 삼투압성 볼륨 팽윤 (Swelling)
                let swellVolume = Math.min(1.42, 0.85 + time * 0.12) + Math.sin(time*2.5)*0.015;
                ctx.translate(cx, cy);
                ctx.scale(swellVolume, swellVolume);

                // 고분자 아미노산 음전하 사슬 가교망 (1A9M 고유 굴곡 라인 재현)
                ctx.strokeStyle = '#db2777'; ctx.lineWidth = 4;
                for (let i = -3; i <= 3; i++) {
                    ctx.beginPath();
                    let wave = Math.sin(time + i) * 16;
                    ctx.moveTo(-160, i * 35 + wave);
                    ctx.bezierCurveTo(-60, -50 + i * 20 + wave, 60, 50 + i * 20 - wave, 160, i * 35 - wave);
                    ctx.stroke();
                    
                    // 사슬에 중화 흡착되어 박히는 양이온(Na+, Ca2+) 노드 시각화
                    ctx.fillStyle = '#ea580c';
                    ctx.beginPath(); ctx.arc(0, i * 20 + wave/2, 5, 0, Math.PI*2); ctx.fill();
                }

                // 주변에서 중심 기질을 향해 고속 압입되는 H2O (HOH) 물 분자 유동 렌더링
                ctx.restore(); ctx.save();
                molecules.forEach(p => {
                    let shrinkFactor = Math.max(0.01, 1 - time * 0.15);
                    let hx = cx + Math.cos(p.rad) * 270 * shrinkFactor;
                    let hy = cy + Math.sin(p.rad) * 170 * shrinkFactor;
                    ctx.fillStyle = '#38bdf8'; ctx.beginPath(); ctx.arc(hx, hy, 5, 0, Math.PI*2); ctx.fill();
                });
            }
            else if (step === 4) {
                // 4. Minicollagen (1CAG) 삼중나선 외벽 그물망 150 bar 고압 응축 전유 모션
                // 초고압 상태의 변형 에너지를 표현하기 위해 고주파 탄성 진동 물리 연산 벡터 부여
                let vibrationX = (Math.random() - 0.5) * 7.5;
                let vibrationY = (Math.random() - 0.5) * 7.5;
                ctx.translate(cx + vibrationX, cy + vibrationY);

                // 삼중나선(Triple-Helix) 콜라겐 피브릴 격자 구조 고증 렌더링
                ctx.strokeStyle = '#ca8a04'; ctx.lineWidth = 4;
                ctx.fillStyle = 'rgba(254, 240, 138, 0.15)';
                ctx.beginPath();
                for (let a = 0; a <= Math.PI * 2; a += 0.05) {
                    let helixCoil = Math.sin(a * 28 + time * 18) * 7; // 삼중나선 가교 그물망의 꼬임 결합 구조 수식
                    let r = 145 + helixCoil;
                    let x = Math.cos(a) * r;
                    let y = Math.sin(a) * r;
                    if (a === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.closePath(); ctx.fill(); ctx.stroke();

                // Nematogalectin (6RRE) 및 Glycan 지지 발판 노드 결합체 드로잉
                ctx.fillStyle = '#eab308';
                for (let a = 0; a < Math.PI * 2; a += 0.5) {
                    let lx = Math.cos(a) * 145;
                    let ly = Math.sin(a) * 145;
                    ctx.beginPath(); ctx.arc(lx, ly, 6, 0, Math.PI*2); ctx.fill();
                    // 당사슬(Glycan) 가지 묘사
                    ctx.strokeStyle = '#eab308'; ctx.lineWidth = 1.5;
                    ctx. someLine = ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx*1.08, ly*1.08); ctx.stroke();
                }
            }
            else if (step === 5) {
                // 5. Shaft Filaments (1CAG) 반전 및 Tubule Wall (3HQV) + Barbs (4UXE) 초고속 사출
                let launchOffset = - (time * 185);
                if (launchOffset < -580) timeline = 0; // 초고속 발사 시퀀스 무한 루프 반복

                ctx.translate(cx, cy + launchOffset);

                // 1) 반전 전개되는 중심 Shaft 및 Tubule 내벽 관통 원통형 관 레이아웃
                ctx.strokeStyle = '#dc2626'; ctx.lineWidth = 5;
                ctx.fillStyle = '#16a34a'; // 고증된 주 관통로 내부 코어 색상
                ctx.beginPath();
                ctx.moveTo(-14, 220); ctx.lineTo(-9, -140); ctx.lineTo(9, -140); ctx.lineTo(14, 220);
                ctx.closePath(); ctx.fill(); ctx.stroke();

                // 내벽의 촘촘한 고리형 나선 주름선 구조 (3HQV 나선 피치 고증)
                ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 2;
                for(let h = 200; h > -130; h -= 14) {
                    ctx.beginPath(); ctx.moveTo(-9, h); ctx.lineTo(9, h - 6); ctx.stroke();
                }

                // 2) 자포관 선단에 대칭 배치된 날카로운 삼차 역방향 Barbs 가시 작살 복합체 (4UXE)
                ctx.fillStyle = '#dc2626'; ctx.strokeStyle = '#991b1b'; ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.moveTo(0, -150); // 최선단 스파이크 꼭짓점
                ctx.lineTo(-32, -100); ctx.lineTo(-14, -105); ctx.lineTo(0, -60); // 좌측 가시 깃
                ctx.lineTo(14, -105); ctx.lineTo(32, -100); // 우측 가시 깃
                ctx.closePath(); ctx.fill(); ctx.stroke();
            }

            ctx.restore();
        }

        function runBiophysicsLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            timeline += 0.035;

            // 기본 참조선 (상피 세포 기저막 물리 경계 가이드 라인)
            ctx.
