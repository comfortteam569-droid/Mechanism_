<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>말미잘 자포 발사 분자 메커니즘 시뮬레이터</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(17, 24, 39, 0.9);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
            overflow: hidden;
        }

        #container {
            display: flex;
            width: 100vw; height: 100vh;
        }

        /* 왼쪽 기능 제어반 패널 */
        #control-panel {
            width: 380px; height: 100%;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 35px 26px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        /* 오른쪽 시뮬레이션 엔진 캔버스 영역 */
        #viewer-container {
            flex: 1; height: 100%;
            position: relative;
            background: radial-gradient(circle at center, #111827 0%, #070a10 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 에러 발생 가능성을 제로로 만든 브라우저 자체 그래픽 캔버스 */
        #simulation-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        h1 {
            font-size: 22px; margin: 0 0 30px 0; font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #60a5fa, #34d399);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .step-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px; padding: 12px; margin-bottom: 14px;
            transition: all 0.3s ease;
        }

        .step-card.active {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.08);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.15);
        }

        .btn {
            width: 100%; padding: 14px;
            background-color: var(--primary); color: white;
            border: none; border-radius: 8px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:hover:not(:disabled) { 
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn:disabled {
            background-color: #1f2937; color: #4b5563; cursor: not-allowed;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        /* 하단 메커니즘 실시간 해설창 */
        #status-box {
            margin-top: auto; background: rgba(0, 0, 0, 0.5);
            border-radius: 10px; padding: 18px; font-size: 13.5px; line-height: 1.6;
            border-left: 4px solid var(--primary); min-height: 140px;
            box-sizing: border-box;
        }

        #status-title { font-weight: 700; margin-bottom: 8px; color: #60a5fa; font-size: 14.5px; }
        #status-desc { color: #e5e7eb; }
    </style>
</head>
<body>

    <div id="container">
        <div id="control-panel">
            <h1>자포 발사 분자 메커니즘</h1>

            <div class="step-card active" id="card-1">
                <button class="btn" id="btn-1" onclick="startStage(1)">ㄱ. 화학적 자극 (과분극)</button>
            </div>

            <div class="step-card" id="card-2">
                <button class="btn" id="btn-2" onclick="startStage(2)" disabled>ㄴ. 기계적 자극 (nCaV 활성)</button>
            </div>

            <div class="step-card" id="card-3">
                <button class="btn" id="btn-3" onclick="startStage(3)" disabled>ㄷ. 삼투압 형성 (팽윤)</button>
            </div>

            <div class="step-card" id="card-4">
                <button class="btn" id="btn-4" onclick="startStage(4)" disabled>ㄹ. 캡슐벽 탄성 저장</button>
            </div>

            <div class="step-card" id="card-5">
                <button class="btn" id="btn-5" onclick="startStage(5)" disabled>ㅁ. 자포관 전개 (Eversion)</button>
            </div>

            <div id="status-box">
                <div id="status-title">시스템 준비 완료</div>
                <div id="status-desc">첫 번째 버튼을 누르면 자포세포막의 화학적 감지 메커니즘 분자 시뮬레이션이 브라우저 그래픽 가속을 통해 즉시 가동됩니다.</div>
            </div>
        </div>

        <div id="viewer-container">
            <canvas id="simulation-canvas"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simulation-canvas');
        const ctx = canvas.getContext('2d');

        let currentStage = 0;
        let animationFrameId = null;
        let time = 0;

        // 애니메이션 객체 관리용 배열
        let ions = [];
        let capsuleRadius = 45;
        let capsuleColor = 'rgba(16, 185, 129, 0.2)';
        let capsuleStroke = 'rgba(16, 185, 129, 0.6)';
        let jitter = 0;
        let shaftY = 0;
        let tubuleLength = 0;
        let barbs = [];

        // 해상도 동적 설정
        function resize() {
            canvas.width = canvas.clientWidth * window.devicePixelRatio;
            canvas.height = canvas.clientHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            drawScene();
        }
        window.addEventListener('resize', resize);

        // 초기 화면 그리기 설정
        window.onload = function() {
            resize();
            drawScene();
        };

        function drawScene() {
            const w = canvas.width / window.devicePixelRatio;
            const h = canvas.height / window.devicePixelRatio;
            
            ctx.clearRect(0, 0, w, h);
            
            // 배경 그라데이션 적용
            let grad = ctx.createRadialGradient(w/2, h/2, 10, w/2, h/2, Math.max(w, h));
            grad.addColorStop(0, '#111827');
            grad.addColorStop(1, '#070a10');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            // 5단계 사출 상태가 아닐 때만 이온 채널 및 기본 세포 구조 렌더링
            if (currentStage < 5) {
                // 세포막 뼈대 드로잉
                ctx.beginPath();
                ctx.moveTo(0, h * 0.35);
                ctx.lineTo(w, h * 0.35);
                ctx.strokeStyle = 'rgba(255,255,255,0.08)';
                ctx.lineWidth = 12;
                ctx.stroke();

                // [좌측] nAChR 수용체 채널 단백질 렌더링 (파란색 계열)
                ctx.fillStyle = '#3b82f6';
                ctx.fillRect(w * 0.25 - 25, h * 0.35 - 35, 18, 70);
                ctx.fillRect(w * 0.25 + 7, h * 0.35 - 35, 18, 70);
                ctx.fillStyle = '#60a5fa';
                ctx.font = 'bold 11px sans-serif';
                ctx.fillText("nAChR", w * 0.25 - 18, h * 0.35 - 45);

                // [우측] nCaV 전압개폐성 칼슘 채널 단백질 렌더링
                if (currentStage >= 2) {
                    ctx.fillStyle = '#38bdf8'; // 활성화 상태 (하늘색)
                    ctx.fillRect(w * 0.75 - 25, h * 0.35 - 35, 20, 70);
                    ctx.fillRect(w * 0.75 + 5, h * 0.35 - 35, 20, 70);
                } else if (currentStage === 1) {
                    ctx.fillStyle = '#34d399'; // 과분극 프라이밍 상태 (녹색)
                    ctx.fillRect(w * 0.75 - 22, h * 0.35 - 35, 16, 70);
                    ctx.fillRect(w * 0.75 + 6, h * 0.35 - 35, 16, 70);
                } else {
                    ctx.fillStyle = '#4b5563'; // 기본 평시 불활성 상태 (회색)
                    ctx.fillRect(w * 0.75 - 20, h * 0.35 - 35, 14, 70);
                    ctx.fillRect(w * 0.75 + 6, h * 0.35 - 35, 14, 70);
                }
                ctx.fillStyle = currentStage >= 1 ? '#38bdf8' : '#9ca3af';
                ctx.fillText("nCaV", w * 0.75 - 13, h * 0.35 - 45);

                // [하단 중앙] 자포 캡슐 구형 구조 구조화
                ctx.save();
                ctx.translate(w / 2 + (Math.random() * jitter - jitter/2), h * 0.75);
                ctx.beginPath();
                ctx.arc(0, 0, capsuleRadius, 0, Math.PI * 2);
                ctx.fillStyle = capsuleColor;
                ctx.fill();
                ctx.strokeStyle = capsuleStroke;
                ctx.lineWidth = 3;
                ctx.stroke();
                
                // 캡슐 내부 고분자 기질 입자 핵심 표현
                if (currentStage >= 3) {
                    ctx.fillStyle = '#f472b6';
                    for (let i = 0; i < 8; i++) {
                        ctx.beginPath();
                        ctx.arc(-25 + i * 7, Math.sin(time * 0.1 + i) * 6, 4 + (capsuleRadius*0.04), 0, Math.PI*2);
                        ctx.fill();
                    }
                }
                ctx.restore();
            }

            // 실시간 객체 애니메이션 루프 드로잉
            ions.forEach(ion => {
                ctx.beginPath();
                ctx.arc(ion.x, ion.y, ion.r, 0, Math.PI * 2);
                ctx.fillStyle = ion.color;
                ctx.fill();
                if (ion.glow) {
                    ctx.shadowColor = ion.color;
                    ctx.shadowBlur = 10;
                }
                ctx.shadowBlur = 0; // 리셋
            });

            // [5단계 피날레 전개 연출 전용 드로잉 단독 세션]
            if (currentStage === 5) {
                const cx = w / 2;
                const baseY = h * 0.85;

                // 1단계: Shaft 방출 및 이중 벽 형성
                ctx.lineWidth = 24;
                ctx.strokeStyle = 'rgba(96, 165, 250, 0.3)';
                ctx.beginPath();
                ctx.moveTo(cx, baseY);
                ctx.lineTo(cx, baseY - shaftY);
                ctx.stroke();

                ctx.lineWidth = 14;
                ctx.strokeStyle = '#34d399';
                ctx.beginPath();
                ctx.moveTo(cx, baseY);
                ctx.lineTo(cx, baseY - shaftY * 0.9);
                ctx.stroke();

                // 2단계 및 3단계: 속이 빈 내부 통로(Lumen)를 관통하여 뒤집혀 사출되는 Tubule 가닥 표출
                if (tubuleLength > 0) {
                    ctx.lineWidth = 6;
                    ctx.strokeStyle = '#f472b6';
                    ctx.beginPath();
                    ctx.moveTo(cx, baseY - shaftY * 0.9);
                    ctx.lineTo(cx, baseY - shaftY * 0.9 - tubuleLength);
                    ctx.stroke();

                    // 나선형으로 개방 정렬되는 자포 특이적 작살 가시(Barbs) 역학 드로잉
                    barbs.forEach(b => {
                        ctx.lineWidth = 2.5;
                        ctx.strokeStyle = '#ef4444';
                        ctx.beginPath();
                        ctx.moveTo(cx, b.y);
                        ctx.lineTo(cx + b.vx, b.y - 4);
                        ctx.stroke();
                    });
                }
            }
        }

        function updateAnimation() {
            time++;
            const w = canvas.width / window.devicePixelRatio;
            const h = canvas.height / window.devicePixelRatio;

            // [1단계 연출 연동 연산]
            if (currentStage === 1) {
                ions.forEach((ion, index) => {
                    if (ion.type === 'ach') {
                        if (ion.y < h * 0.35 - 5) ion.y += 2.5;
                    } else if (ion.type === 'k') {
                        if (time > 40) {
                            ion.y -= 3;
                            ion.x += Math.sin(time*0.05 + index)*0.5;
                        }
                    }
                });
            }

            // [2단계 연출 연동 연산]
            if (currentStage === 2) {
                ions.forEach(ion => {
                    if (ion.y < h * 0.7) {
                        ion.y += 3.5;
                        ion.x += (w * 0.75 - ion.x) * 0.03;
                    } else {
                        ion.x += (w/2 - ion.x) * 0.05;
                        ion.y += (h*0.72 - ion.y) * 0.05;
                    }
                });
            }

            // [3단계 연출 연동 연산]
            if (currentStage === 3) {
                ions.forEach(ion => {
                    let dx = (w / 2) - ion.x;
                    let dy = (h * 0.75) - ion.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist > 5) {
                        ion.x += dx * 0.06;
                        ion.y += dy * 0.06;
                    }
                });
                if (capsuleRadius < 75) {
                    capsuleRadius += 0.4;
                    capsuleColor = `rgba(16, 185, 129, ${0.2 + (capsuleRadius-45)*0.005})`;
                }
            }

            // [4단계 연출 연동 연산]
            if (currentStage === 4) {
                jitter = 4;
                capsuleColor = 'rgba(239, 68, 68, 0.4)';
                capsuleStroke = 'rgba(239, 68, 68, 0.9)';
            }

            // [5단계 피날레 연출 연동 연산]
            if (currentStage === 5) {
                if (shaftY < h * 0.35) {
                    shaftY += 6;
                } else if (tubuleLength < h * 0.4) {
                    tubuleLength += 8;
                    if (Math.random() > 0.4) {
                        let curY = h * 0.85 - shaftY * 0.9 - tubuleLength;
                        let side = Math.random() > 0.5 ? 1 : -1;
                        barbs.push({ y: curY, vx: side * 14 });
                    }
                }
            }

            drawScene();
            animationFrameId = requestAnimationFrame(updateAnimation);
        }

        function startStage(stage) {
            currentStage = stage;
            cancelAnimationFrame(animationFrameId);
            time = 0;
            ions = [];
            
            const w = canvas.width / window.devicePixelRatio;
            const h = canvas.height / window.devicePixelRatio;

            // 스테이지 진입에 따른 UI 활성화 동기화 제어
            for (let i = 1; i <= 5; i++) {
                document.getElementById(`card-${i}`).classList.remove("active");
            }
            document.getElementById(`card-${stage}`).classList.add("active");

            // 핵심 기작 해설 실시간 로드 매핑
            if (stage === 1) {
                updateStatus("ㄱ. 화학적 자극 및 과분극", "ACh가 nAChR에 특이적으로 결합하여 K⁺ 채널 개방 및 대량의 세포 외 유출을 유도하여 전기적 과분극(Hyperpolarization)을 유도합니다. 이 조건 변화를 통해 불활성이던 nCaV 채널이 프라이밍 모드로 변환됩니다.");
                
                // 아세틸콜린 유도 이온 객체 배치
                ions.push({ x: w * 0.25, y: h * 0.1, r: 6, color: '#f59e0b', type: 'ach', glow: true });
                // K+ 이온 배치
                for(let i=0; i<15; i++) {
                    ions.push({ x: w * 0.23 + (Math.random()*15), y: h * 0.38 + (Math.random()*15), r: 2.5, color: '#a7f3d0', type: 'k' });
                }
                setTimeout(() => { document.getElementById("btn-2").disabled = false; }, 2000);
            } 
            else if (stage === 2) {
                updateStatus("ㄴ. 기계적 자극 및 nCaV 오픈", "접촉에 의한 물리 기계 자극이 가해지면 막전위가 탈분극되며 nCaV 채널이 전면 개방됩니다. 이에 따라 세포 외액의 고농도 Ca²⁺ 이온들이 안쪽 전류를 형성하며 폭포수처럼 세포 내부로 쏟아져 유입됩니다.");
                
                // 외부 Ca2+ 이온 배치 무더기 셋팅
                for(let i=0; i<30; i++) {
                    ions.push({ x: w * 0.72 + (Math.random()*25), y: h * 0.05 + (Math.random()*100), r: 3, color: '#38bdf8', type: 'ca' });
                }
                setTimeout(() => { document.getElementById("btn-3").disabled = false; }, 2000);
            } 
            else if (stage === 3) {
                updateStatus("ㄷ. 삼투압 형성 및 기질 팽윤", "세포질 내부로 밀려든 이온들이 자포 내부의 음전하성 고분자 기질과 정전기적으로 결합합니다. 내부 용질 농도가 폭발적으로 증가하며, 강력한 삼투압 경사에 부합해 외부 수분(H₂O)이 급격하게 압입되며 내부 기질이 거대하게 팽윤합니다.");
                
                // 유입되는 물 분자들 생성 배치
                for(let i=0; i<40; i++) {
                    let angle = Math.random() * Math.PI * 2;
                    let r = 120 + Math.random() * 50;
                    ions.push({ x: w/2 + Math.cos(angle)*r, y: h*0.75 + Math.sin(angle)*r, r: 2, color: '#60a5fa', type: 'water' });
                }
                setTimeout(() => { document.getElementById("btn-4").disabled = false; }, 2000);
            } 
            else if (stage === 4) {
                updateStatus("ㄹ. 복합 층상구조의 탄성 변형", "수분 압입의 결과로 캡슐 내부 압력은 한계치인 150 bar에 육박합니다.minicollagen그물망 섬유와 내벽 구조물들이 변형 저항력에 부합해 뒤틀리고 늘어나면서 내부 탄성 에너지를 한계치까지 축적합니다.");
                
                setTimeout(() => { document.getElementById("btn-5").disabled = false; }, 2000);
            } 
            else if (stage === 5) {
                updateStatus("ㅁ. 자포관 전개 3단계", "[1] Shaft 가 초고속 방출(Discharge)되며 두 겹의 이중 벽을 만들고, [2] 반동력에 의해 안팎이 180도 뒤집어지는 Eversion을 완료해 내부 통로(Lumen)를 확보합니다. [3] 최종적으로 내부에 말려있던 Tubule이 통로를 관통 돌출하며 나선 격자형 작살 가시(Barbs)를 외벽 표면에 활짝 정개시킵니다.");
                
                shaftY = 0;
                tubuleLength = 0;
                barbs = [];
            }

            updateAnimation();
        }

        function updateStatus(title, desc) {
            document.getElementById("status-title").innerText = title;
            document.getElementById("status-desc").innerText = desc;
        }
    </script>
</body>
</html>
