<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>말미잘 자포 발사 실제 분자 표면 3D 애니메이션 시뮬레이터</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://3dmol.org/build/3Dmol-min.js"></script>
    
    <style>
        :root {
            --bg-dark: #020408;
            --panel-bg: rgba(7, 11, 21, 0.95);
            --primary: #3b82f6;
            --accent: #fbbf24;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
            overflow: hidden;
        }

        #dashboard { display: flex; width: 100vw; height: 100vh; }

        /* 왼쪽 제어반 */
        #sidebar {
            width: 410px; height: 100%;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 24px; box-sizing: border-box;
            display: flex; flex-direction: column; z-index: 10;
            box-shadow: 15px 0 35px rgba(0, 0, 0, 0.7);
        }

        /* 오른쪽 메인 3D 실제 분자 외형 뷰어 */
        #main-viewer-container { flex: 1; height: 100%; position: relative; background: #000000; }
        #molecule-viewer { width: 100%; height: 100%; }

        h1 {
            font-size: 18px; margin: 0 0 4px 0; font-weight: 800;
            background: linear-gradient(to right, #60a5fa, #f43f5e);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .subtitle { font-size: 11px; color: var(--text-sub); margin-bottom: 20px; }

        .step-list { display: flex; flex-direction: column; gap: 8px; }
        .step-item {
            background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px; padding: 12px; cursor: pointer; transition: all 0.2s ease;
        }
        .step-item.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.15); }
        .step-header { display: flex; justify-content: space-between; align-items: center; font-size: 12.5px; font-weight: 700; }
        .pdb-badge {
            font-family: monospace; font-size: 11px; color: var(--accent);
            background: rgba(251, 191, 36, 0.1); padding: 2px 6px; border-radius: 4px;
        }

        /* 설명창 */
        #description-panel { margin-top: auto; background: rgba(0, 0, 0, 0.6); border-radius: 8px; padding: 14px; border-left: 4px solid var(--primary); }
        #desc-title { font-size: 13px; font-weight: 700; margin-bottom: 6px; color: #60a5fa; }
        #desc-text { font-size: 12px; line-height: 1.5; color: #e2e8f0; text-align: justify; }

        #ui-hint {
            position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.85);
            padding: 8px 16px; border-radius: 30px; font-size: 11px; color: #f43f5e;
            border: 1px solid rgba(244,63,94,0.2); pointer-events: none; z-index: 5;
        }
        #loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 15; font-size: 12px; color: #38bdf8;
        }
        .spinner { width: 24px; height: 24px; border: 2px solid rgba(56,189,248,0.2); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="dashboard">
        <div id="sidebar">
            <h1>실제 분자 표면 애니메이션</h1>
            <div class="subtitle">RCSB PDB 실제 분자 표면 모델(Surface) 실시간 시뮬레이터</div>

            <div class="step-list">
                <div class="step-item active" onclick="loadStage('7KCO', 1)">
                    <div class="step-header"><span>ㄱ. 화학 자극 수용체 결합</span><span class="pdb-badge">7KCO</span></div>
                </div>
                <div class="step-item" onclick="loadStage('6JPA', 2)">
                    <div class="step-header"><span>ㄴ. 칼슘 채널 개방 및 이온 유입</span><span class="pdb-badge">6JPA</span></div>
                </div>
                <div class="step-item" onclick="loadStage('1A9M', 3)">
                    <div class="step-header"><span>ㄷ. 기질 내부 삼투압 팽윤 (Swelling)</span><span class="pdb-badge">1A9M</span></div>
                </div>
                <div class="step-item" onclick="loadStage('1BKV', 4)">
                    <div class="step-header"><span>ㄹ. 콜라겐 그물망 탄성 압축</span><span class="pdb-badge">1BKV</span></div>
                </div>
                <div class="step-item" onclick="loadStage('3HQV', 5)">
                    <div class="step-header"><span>ㅁ. 자포관 고속 사출 및 전개</span><span class="pdb-badge">3HQV</span></div>
                </div>
            </div>

            <div id="description-panel">
                <div id="desc-title">로딩 중...</div>
                <div id="desc-text">로딩 중...</div>
            </div>
        </div>

        <div id="main-viewer-container">
            <div id="ui-hint">🧬 매끄러운 유기체 덩어리 형태의 진짜 분자 표면입니다. 마우스 휠로 확대/축소해 보세요.</div>
            <div id="loading-overlay"><div class="spinner"></div><div id="loading-text">실제 단백질의 3D 입체 표면(Surface) 계산 중...</div></div>
            <div id="molecule-viewer"></div>
        </div>
    </div>

    <script>
        let viewer = null;
        let currentStage = 0;
        let animationId = null;
        let particles = [];
        let stageTime = 0;

        const descriptions = {
            1: { title: "nAChR 수용체 실제 분자 표면 모델 [7KCO]", text: "원자 알갱이 대신 단백질의 실제 3D 겉모습 표면을 매끄러운 덩어리로 시각화했습니다. 적색 수용체 분자들이 매끄러운 단백질 표면 홈을 타고 결합하는 물리적 양상을 보여줍니다." },
            2: { title: "nCaV 칼슘 채널 실제 분자 표면 [6JPA]", text: "입체 표면 덩어리 정중앙에 뚫린 진짜 분자 터널 구멍을 확인하세요. 청색 이온들이 표면으로 이루어진 실제 채널 내부 빈 공간을 관통해 흐릅니다." },
            3: { title: "Poly-γ-Glu 음전하 분자 표면 팽창 [1A9M]", text: "매끄러운 고분자 사슬 표면입니다. 사방에서 녹색 물 분자들이 이 입체 덩어리 표면 사이사이로 흡착되며 삼투압성 압력을 형성합니다." },
            4: { title: "Minicollagen 삼중나선 분자 표면 응축 [1BKV]", text: "실제 콜라겐 겉모습이 초고밀도로 엮인 입체 표면입니다. 엄청난 내부 유체 압력을 버터내기 위해 분자 표면 전체가 격렬하게 진동하며 에너지를 축적합니다." },
            5: { title: "Tubule Wall 자포관 분자 표면 사출 [3HQV]", text: "원통형으로 엮인 실제 자포관 표면 덩어리입니다. 압축 해제와 동시에 부드러운 분자 표면 구조물 자체가 나선 회전을 일으키며 초고속으로 전개됩니다." }
        };

        $(document).ready(function() {
            viewer = $3Dmol.createViewer($('#molecule-viewer'), { defaultcolors: $3Dmol.rasmolElementColors });
            loadStage('7KCO', 1);
        });

        function loadStage(pdbId, stageNum) {
            currentStage = stageNum;
            stageTime = 0;
            if (animationId) cancelAnimationFrame(animationId);

            $('#loading-overlay').fadeIn(100);
            $('.step-item').removeClass('active');
            $(`.step-list .step-item:nth-child(${stageNum})`).addClass('active');

            document.getElementById('desc-title').innerText = descriptions[stageNum].title;
            document.getElementById('desc-text').innerText = descriptions[stageNum].text;

            viewer.clear();
            
            $3Dmol.download("pdb:" + pdbId, viewer, {}, function(model) {
                
                // 🌟 핵심 변경: 앙상한 선이나 따닥따닥 붙은 구체를 다 지우고, '매끄러운 실제 분자 표면' 생성!
                viewer.addSurface($3Dmol.SurfaceType.MS, {
                    opacity: 0.95,
                    colorscheme: 'spectrum' // 분자 표면에 아름다운 스펙트럼 색상 입히기
                }, {}, {});
                
                viewer.zoomTo();
                initParticles(stageNum);
                
                $('#loading-overlay').fadeOut(300);
                runAnimation();
            });
        }

        function initParticles(stageNum) {
            particles = [];
            if (stageNum === 1) {
                for(let i=0; i<20; i++) {
                    particles.push({ x: (Math.random()-0.5)*90, y: 70 + Math.random()*30, z: (Math.random()-0.5)*90, targetY: (Math.random()-0.5)*15, color: '#ef4444', size: 2.2, speed: 0.9 + Math.random() });
                }
            } else if (stageNum === 2) {
                for(let i=0; i<40; i++) {
                    particles.push({ x: (Math.random()-0.5)*8, y: 60 + Math.random()*40, z: (Math.random()-0.5)*8, color: '#38bdf8', size: 1.5, speed: 1.8 + Math.random() });
                }
            } else if (stageNum === 3) {
                for(let i=0; i<60; i++) {
                    let angle = Math.random() * Math.PI * 2;
                    let r = 60 + Math.random() * 20;
                    particles.push({ x: Math.cos(angle)*r, y: (Math.random()-0.5)*50, z: Math.sin(angle)*r, color: '#34d399', size: 1.3, speed: 0.8 });
                }
            } else if (stageNum === 4) {
                for(let i=0; i<25; i++) {
                    particles.push({ x: (Math.random()-0.5)*20, y: (Math.random()-0.5)*50, z: (Math.random()-0.5)*20, color: '#fbbf24', size: 1.0, pulse: Math.random()*5 });
                }
            } else if (stageNum === 5) {
                for(let i=0; i<35; i++) {
                    particles.push({ x: (Math.random()-0.5)*15, y: -50 - Math.random()*30, z: (Math.random()-0.5)*15, color: '#ec4899', size: 1.6 });
                }
            }
        }

        function runAnimation() {
            stageTime += 0.05;
            viewer.removeAllShapes();

            if (currentStage === 1) {
                particles.forEach(p => {
                    if (p.y > p.targetY) { p.y -= p.speed; } 
                    else { p.y = 80; p.x = (Math.random()-0.5)*90; p.z = (Math.random()-0.5)*90; }
                    viewer.addSphere({ center: {x: p.x, y: p.y, z: p.z}, radius: p.size, color: p.color });
                });
                viewer.rotate(0.12, 'y');

            } else if (currentStage === 2) {
                particles.forEach(p => {
                    p.y -= p.speed;
                    p.x += Math.sin(p.y * 0.15) * 0.2;
                    p.z += Math.cos(p.y * 0.15) * 0.2;
                    if (p.y < -60) { p.y = 70; p.x = (Math.random()-0.5)*8; p.z = (Math.random()-0.5)*8; }
                    viewer.addSphere({ center: {x: p.x, y: p.y, z: p.z}, radius: p.size, color: p.color });
                });
                viewer.rotate(0.15, 'y');

            } else if (currentStage === 3) {
                particles.forEach(p => {
                    let length = Math.sqrt(p.x*p.x + p.z*p.z);
                    if (length > 4) {
                        p.x -= (p.x / length) * p.speed;
                        p.z -= (p.z / length) * p.speed;
                    } else {
                        let angle = Math.random() * Math.PI * 2;
                        let r = 70; p.x = Math.cos(angle)*r; p.z = Math.sin(angle)*r;
                    }
                    viewer.addSphere({ center: {x: p.x, y: p.y, z: p.z}, radius: p.size, color: p.color });
                });
                viewer.rotate(0.08, 'y');

            } else if (currentStage === 4) {
                let shake = Math.sin(stageTime * 6) * 0.7;
                viewer.translate(shake, 0);
                
                particles.forEach(p => {
                    p.pulse += 0.25;
                    let currentRadius = p.size + Math.sin(p.pulse) * 0.4;
                    viewer.addSphere({ center: {x: p.x, y: p.y, z: p.z}, radius: currentRadius, color: p.color });
                });

            } else if (currentStage === 5) {
                viewer.translate(0, 1.4); 
                if(stageTime > 12) {
                    viewer.zoomTo();
                    stageTime = 0;
                }
                
                particles.forEach(p => {
                    p.y += 2.2;
                    if (p.y > 60) p.y = -60;
                    viewer.addSphere({ center: {x: p.x, y: p.y, z: p.z}, radius: p.size, color: p.color });
                });
                viewer.rotate(1.2, 'y');
            }

            viewer.render();
            animationId = requestAnimationFrame(runAnimation);
        }
    </script>
</body>
</html>
