<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>말미잘 자포 사출 분자 역학 2D 일러스트 시뮬레이터</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.95);
            --accent-blue: #38bdf8;
        }
        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: 'Pretendard', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 {
            font-size: 18px;
            margin: 0 0 5px 0;
            color: var(--accent-blue);
        }
        .subtitle { font-size: 12px; color: #94a3b8; margin-bottom: 15px; }
        
        /* 메인 시뮬레이션 스크린 (논문 모식도 스타일의 깔끔한 밝은 배경) */
        #canvas-container {
            position: relative;
            width: 780px;
            height: 440px;
            border: 2px solid #334155;
            border-radius: 12px;
            background: #f8fafc; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        canvas { display: block; width: 100%; height: 100%; }

        /* 컨트롤 버튼 패널 */
        #control-panel { margin-top: 15px; display: flex; gap: 6px; }
        .control-btn {
            background: #1e293b; border: 1px solid #334155; color: #94a3b8;
            padding: 10px 12px; font-size: 11px; font-weight: 600; border-radius: 6px; cursor: pointer; transition: all 0.2s;
        }
        .control-btn.current {
            background: #0284c7; color: #ffffff; border-color: #0284c7;
            box-shadow: 0 0 10px rgba(2, 132, 199, 0.5);
        }

        /* 설명 대시보드 */
        #status-dashboard {
            width: 780px; margin-top: 15px; padding: 12px;
            background: var(--panel-bg); border-radius: 8px; border-left: 4px solid var(--accent-blue); box-sizing: border-box;
        }
        #dashboard-title { font-size: 13px; font-weight: bold; color: var(--accent-blue); margin-bottom: 4px; }
        #dashboard-desc { font-size: 11px; line-height: 1.5; color: #cbd5e1; }
    </style>
</head>
<body>

    <h1>Nematostella vectensis 자포 사출 분자 역학 애니메이션 시뮬레이터</h1>
    <div class="subtitle">학생 작성 메커니즘 데이터 기반 - 2D 바이오 모식도 일러스트 엔진</div>

    <div id="canvas-container">
        <canvas id="biophysicsCanvas" width="780" height="440"></canvas>
    </div>

    <div id="control-panel">
        <button class="control-btn" id="btn1" onclick="changeStep(1)">1. 화학 자극 (nAChR)</button>
        <button class="control-btn" id="btn2" onclick="changeStep(2)">2. 이온 유입 (nCaV)</button>
        <button class="control-btn" id="btn3" onclick="changeStep(3)">3. 삼투 팽윤 (Poly-&gamma;-Glu)</button>
        <button class="control-btn" id="btn4" onclick="changeStep(4)">4. 탄성 응축 (Minicollagen)</button>
        <button class="control-btn" id="btn5" onclick="changeStep(5)">5. 초고속 사출 (Tubule 복합체)</button>
    </div>

    <div id="status-dashboard">
        <div id="dashboard-title">대기 중</div>
        <div id="dashboard-desc">상단 버튼을 누르면 해당 메커니즘의 분자 고증 일러스트 애니메이션이 재생됩니다.</div>
    </div>

    <script>
        const canvas = document.getElementById('biophysicsCanvas');
        const ctx = canvas.getContext('2d');

        let currentStep = 1;
        let progressTime = 0;
        let movingParticles = [];

        const metaText = {
            1: { title: "STEP 1 : nAChR 오량체 구조 표면의 리간드 도킹 애니메이션", desc: "ACh 화학 자극 입자들이 상단 상피세포막에 위치한 고증된 nAChR 오량체(Pentamer) 단백질 수용체의 고유 결합 포켓을 향해 직접 유동하며 결합(Docking)하는 활성화 과정입니다." },
            2: { title: "STEP 2 : nCaV 채널 중심 기공 개방 및 Calcium Influx 애니메이션", desc: "물리적 자극이 트리거되어 nCaV 채널의 대칭형 서브유닛 구조 중심부에 위치한 이온 기공(Pore) 터널이 스르륵 열리며, 외부에 있던 Ca2+ 이온들이 통로 내부로 빠르게 하강 유입됩니다." },
            3: { title: "STEP 3 : Poly-&gamma;-glutamate 사슬 중화에 따른 삼투압성 팽윤 애니메이션", desc: "유입된 이온이 Poly-&gamma;-glutamate 고분자 사슬의 음전하를 중화시킴과 동시에 외부의 H2O 물 분자들이 사방에서 중심부로 급격히 압입되면서, 분자 매트릭스 외형 자체가 실제로 크게 부풀어 오릅니다." },
            4: { title: "STEP 4 : 150 bar 초고압을 지탱하는 Minicollagen 가교 그물망 진동 애니메이션", desc: "삼중나선(Triple-Helix) 형태로 촘촘하게 얽힌 미니콜라겐 그물망 외벽이 내부의 가공할 삼투 압력을 팽팽하게 지탱해 내는 메커니즘입니다. 구조망 자체가 고주파로 잘게 떨리며 탄성 변형 에너지를 압축합니다." },
            5: { title: "STEP 5 : Operculum 개방 및 자포관(Tubule Wall) 초고속 반전 사출 애니메이션", desc: "임계 압력 도달 시 상부 캡이 열리고, 내부에 거꾸로 꼬여있던 붉은색 자포관(Tubule) 구조체와 선단의 날카로운 가시(Barbs) 화살촉 복합체가 회전 나선 스핀 물리 운동을 일으키며 수직 상단으로 폭발적으로 사출됩니다." }
        };

        function changeStep(step) {
            currentStep = step;
            progressTime = 0;
            document.querySelectorAll('.control-btn').forEach((b, i) => b.classList.toggle('current', i + 1 === step));
            document.getElementById('dashboard-title').innerText = metaText[step].title;
            document.getElementById('dashboard-desc').innerText = metaText[step].desc;

            movingParticles = [];
            if (step === 1) {
                // 아세틸콜린 리간드 입자 생성
                for(let i=0; i<6; i++) movingParticles.push({ x: 310 + i*35, y: -10, ty: 180 + Math.sin(i)*10, speed: 1.5 + Math.random() });
            } else if (step === 2) {
                // 칼슘 이온 입자 생성
                for(let i=0; i<30; i++) movingParticles.push({ x: 390 + (Math.random()-0.5)*15, y: 50 + Math.random()*20, speed: 2.5 + Math.random()*1.5 });
            } else if (step === 3) {
                // 물 유입 입자 생성
                for(let i=0; i<35; i++) {
                    let a = Math.random() * Math.PI * 2;
                    movingParticles.push({ x: 400 + Math.cos(a)*250, y: 230 + Math.sin(a)*160, angle: a, speed: 1.8 + Math.random() });
                }
            }
        }

        // 🌟 [핵심 로직] 서희 학생의 메커니즘 구성 분자들을 2D 일러스트 스타일로 직접 드로잉하는 그래픽 엔진
        function renderIllust(step, ticks) {
            ctx.save();

            const cx = 400;
            const cy = 230;

            if (step === 1) {
                // 1단계: nAChR 오량체 단백질 실제 2D 형태 모식도 일러스트
                ctx.strokeStyle = '#0284c7'; ctx.lineWidth = 4;
                ctx.fillStyle = '#e0f2fe';
                
                // 5개의 대칭 구조를 가진 오량체 수용체 탑뷰(Top-view) 구조 드로잉
                for (let i = 0; i < 5; i++) {
                    let angle = (i * 2 * Math.PI) / 5;
                    let sx = cx + Math.cos(angle) * 50;
                    let sy = cy + Math.sin(angle) * 50;
                    ctx.beginPath();
                    ctx.arc(sx, sy, 32, 0, Math.PI * 2);
                    ctx.fill(); ctx.stroke();
                    
                    // 결합 포켓 리셉터 라인 디테일
                    ctx.beginPath(); ctx.arc(sx, sy, 12, 0, Math.PI); ctx.stroke();
                }

                // 리간드 입자들이 고유 포켓으로 유기적으로 이동 및 결합하는 애니메이션
                movingParticles.forEach(p => {
                    if (p.y < p.ty) p.y += p.speed;
                    ctx.fillStyle = '#8b5cf6'; ctx.strokeStyle = '#4c1d95'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 7, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                });
            }
            else if (step === 2) {
                // 2단계: nCaV 전압 개폐성 채널 종단면 일러스트 구조
                let gateGap = Math.min(25, ticks * 10); // 기공 통로가 대칭으로 열리는 움직임 벡터
                ctx.strokeStyle = '#2563eb'; ctx.lineWidth = 5;
                ctx.fillStyle = '#eff6ff';

                // 좌측 채널 서브유닛 구조막
                ctx.beginPath();
                ctx.moveTo(cx - 70 - gateGap, cy - 110); ctx.bezierCurveTo(cx - 140 - gateGap, cy - 60, cx - 120 - gateGap, cy + 60, cx - 70 - gateGap, cy + 110);
                ctx.lineTo(cx - 20 - gateGap, cy + 90); ctx.bezierCurveTo(cx - 50 - gateGap, cy + 50, cx - 50 - gateGap, cy - 50, cx - 20 - gateGap, cy - 90);
                ctx.closePath(); ctx.fill(); ctx.stroke();

                // 우측 채널 서브유닛 구조막
                ctx.beginPath();
                ctx.moveTo(cx + 70 + gateGap, cy - 110); ctx.bezierCurveTo(cx + 140 + gateGap, cy - 60, cx + 120 + gateGap, cy + 60, cx + 70 + gateGap, cy + 110);
                ctx.lineTo(cx + 20 + gateGap, cy + 90); ctx.bezierCurveTo(cx + 50 + gateGap, cy + 50, cx + 50 + gateGap, cy - 50, cx + 20 + gateGap, cy - 90);
                ctx.closePath(); ctx.fill(); ctx.stroke();

                // 개방된 기공 통로 내부를 통과해 쏟아지는 Ca2+ 이온 흐름 애니메이션
                movingParticles.forEach(p => {
                    p.y += p.speed;
                    if (p.y > cy + 130) { p.y = cy - 120; p.x = cx + (Math.random()-0.5)*15; }
                    ctx.fillStyle = '#06b6d4'; ctx.strokeStyle = '#0891b2'; ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.arc(p.x + Math.sin(p.y * 0.05) * 10, p.y, 6, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                });
            }
            else if (step === 3) {
                // 3단계: Poly-gamma-glutamate 선형 사슬 구조의 팽창(Swelling) 일러스트
                let swell = Math.min(1.35, 0.85 + ticks * 0.1) + Math.sin(ticks * 2) * 0.02; // 삼투 팽창도 연산
                ctx.translate(cx, cy);
                ctx.scale(swell, swell);

                ctx.strokeStyle = '#db2777'; ctx.lineWidth = 4;
                // 이온 중화로 인해 구불구불하게 변형 연동되는 분자 사슬 매트릭스 그리기
                for (let i = -2; i <= 2; i++) {
                    ctx.beginPath();
                    let offset = Math.sin(ticks + i) * 15;
                    ctx.moveTo(-150, i * 35 + offset);
                    ctx.bezierCurveTo(-50, -40 + i * 20 + offset, 50, 40 + i * 20 - offset, 150, i * 35 - offset);
                    ctx.stroke();
                }

                // 외부 수분(H2O) 분자들이 내부 구조로 무섭게 흡착 유입되는 역학 모션
                ctx.restore(); ctx.save(); // 스케일 독립성 유지
                movingParticles.forEach(p => {
                    let r = Math.max(0.02, 1 - ticks * 0.14);
                    let px = cx + Math.cos(p.angle) * 250 * r;
                    let py = cy + Math.sin(p.angle) * 160 * r;
                    ctx.fillStyle = '#38bdf8'; ctx.beginPath(); ctx.arc(px, py, 5, 0, Math.PI*2); ctx.fill();
                });
            }
            else if (step === 4) {
                // 4단계: Minicollagen 삼중나선 가교 그물망의 150바 초고압 인클로저 일러스트
                // 압축 한계 변형력을 보여주기 위한 촘촘한 고주파 진동(Vibration) 변위 연산
                let sx = (Math.random() - 0.5) * 6;
                let sy = (Math.random() - 0.5) * 6;
                ctx.translate(cx + sx, cy + sy);

                ctx.strokeStyle = '#ca8a04'; ctx.lineWidth = 3.5;
                ctx.fillStyle = 'rgba(254, 240, 138, 0.2)';
                
                // 삼중나선 분자들이 서로 질기게 연결되어 벽면 보호 그물망을 이룬 형태 구조 드로잉
                ctx.beginPath();
                for (let a = 0; a <= Math.PI * 2; a += 0.04) {
                    let helixCoil = Math.sin(a * 24 + ticks * 15) * 6; // 삼중나선 코일 구조 고증 수식
                    let radius = 140 + helixCoil;
                    let x = Math.cos(a) * radius;
                    let y = Math.sin(a) * radius;
                    if (a === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.closePath(); ctx.fill(); ctx.stroke();

                // 가교 연결점 조인트 노드 디테일
                ctx.fillStyle = '#eab308';
                for (let a = 0; a < Math.PI * 2; a += 0.4) {
                    ctx.beginPath(); ctx.arc(Math.cos(a)*140, Math.sin(a)*140, 4, 0, Math.PI*2); ctx.fill();
                }
            }
            else if (step === 5) {
                // 5단계: 자포관(Tubule Wall) 및 선단 가시(Barbs) 복합체 초고속 수직 사출 일러스트
                let launchY = - (ticks * 160);
                if (launchY < -550) animFrame = 0; // 무한 추진 사출 루프 세팅

                ctx.translate(cx, cy + launchY);

                // 1. 나선형 스핀을 그리며 부드럽게 대칭 전개되는 자포 추진관 본체 드로잉
                ctx.strokeStyle = '#dc2626'; ctx.lineWidth = 5;
                ctx.fillStyle = '#16a34a'; // 내부 관 코어 구조
                ctx.beginPath();
                ctx.moveTo(-12, 200); ctx.lineTo(-8, -120); ctx.lineTo(8, -120); ctx.lineTo(12, 200);
                ctx.closePath(); ctx.fill(); ctx.stroke();

                // 사출관 내부의 나선형 트랙 주름선 고증 디테일
                ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 2;
                ctx.beginPath();
                for(let ty = 180; ty > -110; ty -= 15) {
                    ctx.moveTo(-8, ty); ctx.lineTo(8, ty - 8);
                }
                ctx.stroke();

                // 2. 사출관 선단의 날카로운 삼차 대칭형 가시(Barbs) 화살촉 복합체 정밀 드로잉
                ctx.fillStyle = '#dc2626'; ctx.strokeStyle = '#991b1b'; ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, -130);
                ctx.lineTo(-28, -85); ctx.lineTo(-12, -90); ctx.lineTo(0, -50);
                ctx.lineTo(12, -90); ctx.lineTo(28, -85);
                ctx.closePath(); ctx.fill(); ctx.stroke();
            }

            ctx.restore();
        }

        function runAnimationEngine() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            progressTime += 0.035;

            // 세포 기저막 경계선 드로잉
            ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, 110); ctx.lineTo(canvas.width, 110); ctx.stroke();

            // 2D 일러스트 렌더러 호출
            renderIllust(currentStep, progressTime);

            requestAnimationFrame(runAnimationEngine);
        }

        window.onload = function() {
            changeStep(1);
            runAnimationEngine();
        };
    </script>
</body>
</html>
